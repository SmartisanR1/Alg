name: Build & Release (All Platforms)

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            name: macos-amd64
            goos: darwin
            goarch: amd64

          - os: macos-latest
            name: macos-arm64
            goos: darwin
            goarch: arm64

          - os: windows-latest
            name: windows-amd64
            goos: windows
            goarch: amd64

          - os: ubuntu-latest
            name: linux-amd64
            goos: linux
            goarch: amd64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.22

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        run: |
          cd frontend
          npm install
          cd ..

      - name: Build app
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} wails build

      # 📦 打包（不同平台）
      - name: Package macOS
        if: matrix.goos == 'darwin'
        run: |
          cd build/bin
          ditto -c -k --keepParent CryptoKit.app CryptoKit-${{ matrix.name }}.zip

      - name: Package Windows
        if: matrix.goos == 'windows'
        run: |
          cd build/bin
          powershell Compress-Archive -Path CryptoKit.exe -DestinationPath CryptoKit-${{ matrix.name }}.zip

      - name: Package Linux
        if: matrix.goos == 'linux'
        run: |
          cd build/bin
          tar -czvf CryptoKit-${{ matrix.name }}.tar.gz CryptoKit

      # 🚀 发布
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/bin/CryptoKit-*.zip
            build/bin/CryptoKit-*.tar.gz
