name: Build & Release (Production)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-amd64

          - os: windows-latest
            name: windows-amd64

          - os: macos-latest
            name: macos-amd64

          - os: macos-latest
            name: macos-arm64

    steps:
      # 📦 拉取代码
      - name: Checkout
        uses: actions/checkout@v4

      # 🐹 Go 环境
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.22

      # 🌐 Node.js 环境
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ⚙️ Linux 依赖
      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo add-apt-repository universe
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libglib2.0-dev

      # 🔧 Linux webkit alias 修复
      - name: Fix webkit pkg-config alias
        if: runner.os == 'Linux'
        run: |
          sudo ln -s /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.1.pc \
                  /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.0.pc || true

      # ⚡ 缓存 Go
      - name: Cache Go
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}

      # ⚡ 缓存 Node
      - name: Cache Node
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: node-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      # 📦 安装 Wails
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # 📦 安装前端依赖
      - name: Install frontend deps
        run: |
          cd frontend
          npm ci

      # 🏗️ 构建 App
      - name: Build App
        env:
          CGO_ENABLED: 1
        run: wails build

      # 📦 打包 macOS
      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          cd build/bin
          ditto -c -k --keepParent CryptoKit.app CryptoKit-${{ matrix.name }}.zip

      # 📦 打包 Windows
      - name: Package Windows
        if: runner.os == 'Windows'
        run: |
          cd build/bin
          powershell Compress-Archive -Path CryptoKit.exe -DestinationPath CryptoKit-${{ matrix.name }}.zip

      # 📦 打包 Linux（更快）
      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          cd build/bin
          tar -cf - CryptoKit | gzip -1 > CryptoKit-${{ matrix.name }}.tar.gz

      # 🚀 上传 Release
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/bin/*.zip
            build/bin/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
